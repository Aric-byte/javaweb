# HikariCP 连接池配置
# 最小空闲连接数
hikari.minimumIdle=5
# 最大连接池大小
hikari.maximumPoolSize=20
# 连接超时时间（毫秒）
hikari.connectionTimeout=30000
# 空闲连接超时时间（毫秒）
hikari.idleTimeout=600000
# 连接最大生命周期（毫秒）
hikari.maxLifetime=1800000
# 连接测试查询
hikari.connectionTestQuery=SELECT 1
# 连接池名称
hikari.poolName=ExamSystemPool
